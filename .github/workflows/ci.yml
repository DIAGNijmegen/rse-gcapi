name: CI

on:
  push:
  pull_request:
  workflow_call:
  schedule:
    - cron: '34 7 * * 1-5'

env:
  MINIMUM_PYTHON_VERSION: '3.10'

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.MINIMUM_PYTHON_VERSION }}
      - name: Run static code inspections
        run: uv run pre-commit run --all-files

  build:
    runs-on: ubuntu-latest
    permissions:
      # These permissions are needed to interact with GitHub's OIDC Token endpoint.
      id-token: write
      contents: read
    strategy:
      fail-fast: false # Try to work around ECS errors
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Add gc.localhost to /etc/hosts
        run: sudo echo "127.0.0.1 gc.localhost\n127.0.0.1 s3.localhost" | sudo tee -a /etc/hosts
      - name: Install system dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y --no-install-recommends \
            libpq-dev \
            libcurl4-openssl-dev \
            libssl-dev
      - name: Run uv
        run: |
          uv run pytest --cov-branch --cov-report term-missing --cov=tests/ --cov=gcapi/
